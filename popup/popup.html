<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnippetRunner</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- MAIN LIST VIEW -->
  <div id="view-list" class="view active">
    <header>
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">SnippetRunner</span>
      </div>
      <div class="header-right">
        <!-- Export: upload/send out -->
        <button id="btn-export" class="btn-icon" title="Export Snippets">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 2v8M5 4l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <!-- Import: download/bring in -->
        <button id="btn-import" class="btn-icon" title="Import Snippets">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 10V2M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <!-- New snippet -->
        <button id="btn-new" class="btn-icon btn-icon--accent" title="New Snippet">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>
    <!-- hidden file input for import -->
    <input type="file" id="import-file-input" accept=".json" style="display:none"/>

    <div id="snippet-list-empty" class="empty-state hidden">
      <div class="empty-icon">📭</div>
      <p>No snippets yet.<br/>Hit <strong>＋</strong> to create one.</p>
    </div>

    <ul id="snippet-list"></ul>
  </div>

  <!-- IMPORT MODAL -->
  <div id="import-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
          <path d="M8 10V2M5 8l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 11v2a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <h3>Import Snippets</h3>
      </div>
      <p class="modal-subtitle" id="import-summary">Reading file...</p>
      <div id="import-options" class="import-options hidden">
        <label class="import-radio">
          <input type="radio" name="import-mode" value="merge" checked/>
          <div class="import-radio-body">
            <strong>Merge</strong>
            <span>Add new snippets, keep existing ones</span>
          </div>
        </label>
        <label class="import-radio">
          <input type="radio" name="import-mode" value="overwrite"/>
          <div class="import-radio-body">
            <strong>Overwrite</strong>
            <span>Replace all existing snippets</span>
          </div>
        </label>
      </div>
      <div class="modal-actions">
        <button id="import-cancel" class="btn-ghost">Cancel</button>
        <button id="import-confirm" class="btn-primary" style="font-size:12px;padding:5px 14px;">Import</button>
      </div>
    </div>
  </div>

  <!-- RUN MODAL -->
  <div id="run-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-icon">▶</span>
        <h3 id="modal-snippet-name"></h3>
      </div>
      <p class="modal-subtitle">Fill in variables before running</p>
      <div id="modal-vars"></div>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-ghost">Cancel</button>
        <button id="modal-run" class="btn-run">Run</button>
      </div>
    </div>
  </div>

  <!-- LOADING OVERLAY -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="loading-spinner"></div>
      <div class="loading-text">Running<span class="loading-dots"></span></div>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
