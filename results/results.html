<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SnippetRunner — Results</title>
  <link rel="stylesheet" href="results.css" />
</head>
<body>

  <div class="page-wrap">
    <header class="page-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">SnippetRunner</span>
      </div>
      <div class="header-actions">
        <button id="btn-close" class="btn-ghost">Close</button>
      </div>
    </header>

    <div class="results-layout">
      <!-- History sidebar — shown when there are multiple results -->
      <aside id="history-sidebar" class="history-sidebar"></aside>
      <!-- JS builds all content here -->
      <main id="results-main" class="results-main"></main>
    </div>
  </div>

  <script src="../shared.js"></script>
  <script src="results.js"></script>
</body>
</html>
